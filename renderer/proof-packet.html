<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Prism · Proof Packet</title>
<!--
  Prism Proof Packet renderer — self-contained, provider-neutral, theme-aware.
  Reads the JSON in <script id="proof-packet"> and renders the six questions
  (Verified · Evidence · Tests · Assumptions · Risks · Verdict).

  Two ways to use it:
  1. Local: /prism-verify replaces the JSON block below with a run from
     .prism/runs/<id>.json, then open this file in a browser.
  2. Artifact: strip the <!doctype>/<html>/<head>/<body> wrapper and hand the
     inner markup + <style>/<script> to the Artifact tool (it supplies the skeleton).

  Single source of truth: this is the ONLY place that knows how a Proof Packet looks.
-->
<style>
  :root {
    --bg: #ffffff; --fg: #101418; --muted: #5b6570; --card: #f6f7f9;
    --border: #e3e7ec; --accent: #4a1d7a;
    --accept: #1a7f37; --accept-bg: #e6f4ea;
    --review: #9a6700; --review-bg: #fdf3d8;
    --block: #b42318; --block-bg: #fbe9e7;
    --low: #6b7280; --medium: #9a6700; --high: #b42318; --critical: #7a0c00;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117; --fg: #e6edf3; --muted: #8b949e; --card: #161b22;
      --border: #30363d; --accent: #c8a6ff;
      --accept-bg: #12261a; --review-bg: #2b2412; --block-bg: #2b1512;
    }
  }
  :root[data-theme="light"] { --bg:#fff; --fg:#101418; --muted:#5b6570; --card:#f6f7f9; --border:#e3e7ec; --accept-bg:#e6f4ea; --review-bg:#fdf3d8; --block-bg:#fbe9e7; }
  :root[data-theme="dark"]  { --bg:#0d1117; --fg:#e6edf3; --muted:#8b949e; --card:#161b22; --border:#30363d; --accept-bg:#12261a; --review-bg:#2b2412; --block-bg:#2b1512; }

  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg); font-family: var(--sans); line-height: 1.55; }
  .wrap { max-width: 900px; margin: 0 auto; padding: 32px 20px 80px; }
  .eyebrow { font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
  h1 { font-size: 22px; margin: 4px 0 2px; }
  .task { color: var(--muted); font-size: 14px; margin: 0 0 20px; }
  .verdict { display: flex; align-items: center; gap: 14px; padding: 16px 18px; border-radius: 12px; border: 1px solid var(--border); margin: 0 0 24px; }
  .verdict.accept { background: var(--accept-bg); }
  .verdict.human-review { background: var(--review-bg); }
  .verdict.block { background: var(--block-bg); }
  .badge { font-weight: 700; font-size: 13px; letter-spacing: .04em; text-transform: uppercase; padding: 6px 12px; border-radius: 999px; white-space: nowrap; }
  .badge.accept { color: var(--accept); border: 1.5px solid var(--accept); }
  .badge.human-review { color: var(--review); border: 1.5px solid var(--review); }
  .badge.block { color: var(--block); border: 1.5px solid var(--block); }
  .verdict .rationale { font-size: 14px; }
  .verdict .conf { color: var(--muted); font-size: 12px; }

  section { border: 1px solid var(--border); border-radius: 12px; margin: 0 0 16px; overflow: hidden; }
  section > h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 0; padding: 12px 16px; background: var(--card); border-bottom: 1px solid var(--border); }
  section > .body { padding: 12px 16px; font-size: 14px; }
  section .q { color: var(--accent); font-weight: 700; }

  ul { margin: 6px 0; padding-left: 20px; }
  li { margin: 3px 0; }
  .muted { color: var(--muted); }
  code, .mono { font-family: var(--mono); font-size: 12.5px; }
  a.loc { font-family: var(--mono); font-size: 12.5px; color: var(--accent); text-decoration: none; border-bottom: 1px dotted var(--accent); }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .scroll { overflow-x: auto; }
  th, td { text-align: left; padding: 7px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .05em; }
  .sev { font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: .04em; }
  .sev.low { color: var(--low); } .sev.medium { color: var(--medium); }
  .sev.high { color: var(--high); } .sev.critical { color: var(--critical); }

  .chip { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); margin: 2px 4px 2px 0; }
  .chip.grounded { border-color: var(--accept); color: var(--accept); }
  .chip.cross-model-survived { border-color: var(--accent); color: var(--accent); }
  .chip.cross-tier-survived { border-color: var(--medium); color: var(--medium); }
  .chip.struck { border-color: var(--block); color: var(--block); text-decoration: line-through; }
  .vote.refute { color: var(--block); font-weight: 700; }
  .vote.uphold { color: var(--accept); font-weight: 700; }

  .meters { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
  .meter { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; }
  .meter .k { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
  .meter .v { font-size: 20px; font-weight: 700; font-family: var(--mono); }
  .bar { height: 6px; border-radius: 4px; background: var(--border); margin-top: 6px; overflow: hidden; }
  .bar > span { display: block; height: 100%; background: var(--accent); }
  .foot { margin-top: 28px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 14px; }
  .empty { color: var(--muted); font-style: italic; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>
