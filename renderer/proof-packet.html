<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Prism · Proof Packet</title>
<!--
  Prism Proof Packet renderer — self-contained, provider-neutral, theme-aware.
  Reads the JSON in <script id="proof-packet"> and renders the six questions
  (Verified · Evidence · Tests · Assumptions · Risks · Verdict).

  Two ways to use it:
  1. Local: /prism-verify replaces the JSON block below with a run from
     .prism/runs/<id>.json, then open this file in a browser.
  2. Artifact: strip the <!doctype>/<html>/<head>/<body> wrapper and hand the
     inner markup + <style>/<script> to the Artifact tool (it supplies the skeleton).

  Single source of truth: this is the ONLY place that knows how a Proof Packet looks.
-->
<style>
  :root {
    --bg: #ffffff; --fg: #101418; --muted: #5b6570; --card: #f6f7f9;
    --border: #e3e7ec; --accent: #4a1d7a;
    --accept: #1a7f37; --accept-bg: #e6f4ea;
    --review: #9a6700; --review-bg: #fdf3d8;
    --block: #b42318; --block-bg: #fbe9e7;
    --low: #6b7280; --medium: #9a6700; --high: #b42318; --critical: #7a0c00;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117; --fg: #e6edf3; --muted: #8b949e; --card: #161b22;
      --border: #30363d; --accent: #c8a6ff;
      --accept-bg: #12261a; --review-bg: #2b2412; --block-bg: #2b1512;
    }
  }
  :root[data-theme="light"] { --bg:#fff; --fg:#101418; --muted:#5b6570; --card:#f6f7f9; --border:#e3e7ec; --accept-bg:#e6f4ea; --review-bg:#fdf3d8; --block-bg:#fbe9e7; }
  :root[data-theme="dark"]  { --bg:#0d1117; --fg:#e6edf3; --muted:#8b949e; --card:#161b22; --border:#30363d; --accept-bg:#12261a; --review-bg:#2b2412; --block-bg:#2b1512; }

  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg); font-family: var(--sans); line-height: 1.55; }
  .wrap { max-width: 900px; margin: 0 auto; padding: 32px 20px 80px; }
  .eyebrow { font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
  h1 { font-size: 22px; margin: 4px 0 2px; }
  .task { color: var(--muted); font-size: 14px; margin: 0 0 20px; }
  .verdict { display: flex; align-items: center; gap: 14px; padding: 16px 18px; border-radius: 12px; border: 1px solid var(--border); margin: 0 0 24px; }
  .verdict.accept { background: var(--accept-bg); }
  .verdict.human-review { background: var(--review-bg); }
  .verdict.block { background: var(--block-bg); }
  .badge { font-weight: 700; font-size: 13px; letter-spacing: .04em; text-transform: uppercase; padding: 6px 12px; border-radius: 999px; white-space: nowrap; }
  .badge.accept { color: var(--accept); border: 1.5px solid var(--accept); }
  .badge.human-review { color: var(--review); border: 1.5px solid var(--review); }
  .badge.block { color: var(--block); border: 1.5px solid var(--block); }
  .verdict .rationale { font-size: 14px; }
  .verdict .conf { color: var(--muted); font-size: 12px; }

  section { border: 1px solid var(--border); border-radius: 12px; margin: 0 0 16px; overflow: hidden; }
  section > h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin: 0; padding: 12px 16px; background: var(--card); border-bottom: 1px solid var(--border); }
  section > .body { padding: 12px 16px; font-size: 14px; }
  section .q { color: var(--accent); font-weight: 700; }

  ul { margin: 6px 0; padding-left: 20px; }
  li { margin: 3px 0; }
  .muted { color: var(--muted); }
  code, .mono { font-family: var(--mono); font-size: 12.5px; }
  a.loc { font-family: var(--mono); font-size: 12.5px; color: var(--accent); text-decoration: none; border-bottom: 1px dotted var(--accent); }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .scroll { overflow-x: auto; }
  th, td { text-align: left; padding: 7px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  th { color: var(--muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .05em; }
  .sev { font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: .04em; }
  .sev.low { color: var(--low); } .sev.medium { color: var(--medium); }
  .sev.high { color: var(--high); } .sev.critical { color: var(--critical); }

  .chip { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); margin: 2px 4px 2px 0; }
  .chip.grounded { border-color: var(--accept); color: var(--accept); }
  .chip.cross-model-survived { border-color: var(--accent); color: var(--accent); }
  .chip.cross-tier-survived { border-color: var(--medium); color: var(--medium); }
  .chip.struck { border-color: var(--block); color: var(--block); text-decoration: line-through; }
  .vote.refute { color: var(--block); font-weight: 700; }
  .vote.uphold { color: var(--accept); font-weight: 700; }

  .meters { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; }
  .meter { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; }
  .meter .k { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
  .meter .v { font-size: 20px; font-weight: 700; font-family: var(--mono); }
  .bar { height: 6px; border-radius: 4px; background: var(--border); margin-top: 6px; overflow: hidden; }
  .bar > span { display: block; height: 100%; background: var(--accent); }
  .foot { margin-top: 28px; font-size: 12px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 14px; }
  .empty { color: var(--muted); font-style: italic; }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<!-- /prism-verify replaces the contents of this block with a run from .prism/runs/<id>.json -->
<script id="proof-packet" type="application/json">
{
  "schemaVersion": "1.0",
  "id": "2026-07-19-sample",
  "createdAt": "2026-07-19T12:00:00Z",
  "command": "verify",
  "task": "Sample Proof Packet — replace with a real run from .prism/runs/<id>.json",
  "diff": { "source": "staged", "ref": "HEAD", "filesChanged": 2, "insertions": 40, "deletions": 6 },
  "verdict": { "decision": "human-review", "rationale": "Grounded and tests pass, but the fee-rounding assumption is unresolved and could change balances.", "confidence": "medium" },
  "verified": { "inScope": ["balance transfer path", "auth on /pay route"], "outOfScope": ["frontend styling — no behavioural risk"] },
  "evidence": {
    "files": [{ "path": "src/ledger.ts", "lines": "42-58", "why": "confirms transfer debits before credit" }],
    "docs": [{ "source": "installed types: stripe@14.2.0", "claim": "amount is in the smallest currency unit" }],
    "rules": [{ "rule": "amounts are 6-decimal USDC", "citation": "src/money.ts:12", "status": "upheld" }]
  },
  "tests": { "command": "npm test", "passed": ["ledger.spec.ts"], "failed": [], "notRun": ["e2e — needs a live env"] },
  "assumptions": [{ "claim": "fee rounds half-up", "couldChangeVerdict": true, "howToResolve": "confirm with product spec" }],
  "risks": [{ "severity": "medium", "location": "src/ledger.ts:51", "description": "rounding direction unspecified", "category": "data-integrity" }],
  "claims": [{ "id": "c1", "text": "transfer debits before it credits", "label": "grounded", "citation": "src/ledger.ts:44" }],
  "telemetry": {
    "divergence": { "score": 0.41, "evidence": 0.52, "conclusion": 0.25, "threshold": 0.30, "calibrated": false },
    "models": { "draft": "claude-opus-4-8", "judge": "claude-sonnet-5", "decorrelation": "cross-model", "skeptics": [{ "model": "claude-opus-4-8", "provider": "anthropic", "vote": "uphold" }, { "model": "gpt-5-codex", "provider": "openai", "vote": "uphold" }, { "model": "qwen2.5-coder:32b", "provider": "ollama", "vote": "refute" }] },
    "cost": { "totalUsd": 0.14, "byProvider": [{ "provider": "anthropic", "tokensIn": 8200, "tokensOut": 1400, "usd": 0.12 }, { "provider": "ollama", "tokensIn": 3100, "tokensOut": 600, "usd": 0 }] }
  }
}
</script>

<script>
(function () {
  var p;
  try { p = JSON.parse(document.getElementById("proof-packet").textContent); }
  catch (e) { document.getElementById("app").innerHTML = "<p>Invalid Proof Packet JSON.</p>"; return; }

  var el = function (t) { return document.createElement(t); };
  var esc = function (s) { var d = el("div"); d.textContent = s == null ? "" : String(s); return d.innerHTML; };
  var loc = function (s) {
    if (!s) return "";
    var m = String(s).match(/^(.+?):(\d+)/);
    if (!m) return '<span class="mono">' + esc(s) + "</span>";
    return '<a class="loc" href="vscode://file/' + esc(m[1]) + ":" + esc(m[2]) + '">' + esc(s) + "</a>";
  };
  var list = function (arr, fn) {
    if (!arr || !arr.length) return '<span class="empty">none</span>';
    return "<ul>" + arr.map(function (x) { return "<li>" + fn(x) + "</li>"; }).join("") + "</ul>";
  };
  var sec = function (title, q, body) {
    return '<section><h2><span class="q">' + q + "</span> · " + title + '</h2><div class="body">' + body + "</div></section>";
  };

  var v = p.verdict || {};
  var sevRank = { critical: 0, high: 1, medium: 2, low: 3 };
  var risks = (p.risks || []).slice().sort(function (a, b) { return (sevRank[a.severity] ?? 9) - (sevRank[b.severity] ?? 9); });
  var tel = p.telemetry || {};
  var models = tel.models || {};
  var div = tel.divergence || {};

  var html = "";
  html += '<div class="eyebrow">Prism · Proof Packet</div>';
  html += "<h1>" + esc(p.id || "run") + "</h1>";
  html += '<p class="task">' + esc(p.task || "") + "</p>";

  // Verdict
  var dec = v.decision || "human-review";
  html += '<div class="verdict ' + dec + '">';
  html += '<span class="badge ' + dec + '">' + esc(dec.replace("-", " ")) + "</span>";
  html += '<div><div class="rationale">' + esc(v.rationale || "") + "</div>";
  if (v.confidence) html += '<div class="conf">confidence: ' + esc(v.confidence) + "</div>";
  html += "</div></div>";

  // Q1 Verified
  var vd = p.verified || {};
  html += sec("Verified", "Q1",
    "<strong>In scope</strong>" + list(vd.inScope, esc) +
    "<strong>Out of scope</strong>" + list(vd.outOfScope, function (x) { return esc(x); }));

  // Q2 Evidence
  var ev = p.evidence || {};
  html += sec("Evidence", "Q2",
    "<strong>Files re-opened</strong>" + list(ev.files, function (f) { return loc(f.path + ":" + f.lines) + (f.why ? ' <span class="muted">— ' + esc(f.why) + "</span>" : ""); }) +
    "<strong>Docs / types checked</strong>" + list(ev.docs, function (d) { return "<span class='mono'>" + esc(d.source) + "</span>" + (d.claim ? ' <span class="muted">— ' + esc(d.claim) + "</span>" : ""); }) +
    "<strong>Rules / invariants</strong>" + list(ev.rules, function (r) { return esc(r.rule) + " " + (r.citation ? loc(r.citation) : "") + ' <span class="muted">[' + esc(r.status || "?") + "]</span>"; }));

  // Q3 Tests
  var t = p.tests || {};
  html += sec("Tests", "Q3",
    (t.command ? '<div class="muted mono">$ ' + esc(t.command) + "</div>" : "") +
    "<strong>Passed</strong>" + list(t.passed, esc) +
    "<strong>Failed</strong>" + list(t.failed, esc) +
    "<strong>Not run</strong>" + list(t.notRun, esc));

  // Q4 Assumptions
  html += sec("Assumptions", "Q4",
    list(p.assumptions, function (a) { return esc(a.claim) + (a.couldChangeVerdict ? ' <span class="sev high">could change verdict</span>' : "") + (a.howToResolve ? ' <span class="muted">— ' + esc(a.howToResolve) + "</span>" : ""); }));

  // Q5 Risks
  var risksHtml;
  if (!risks.length) risksHtml = '<span class="empty">no risks identified</span>';
  else {
    risksHtml = '<div class="scroll"><table><thead><tr><th>Severity</th><th>Location</th><th>Category</th><th>Description</th></tr></thead><tbody>';
    risks.forEach(function (r) {
      risksHtml += "<tr><td><span class='sev " + esc(r.severity) + "'>" + esc(r.severity) + "</span></td><td>" + loc(r.location) + "</td><td class='muted'>" + esc(r.category || "") + "</td><td>" + esc(r.description) + "</td></tr>";
    });
    risksHtml += "</tbody></table></div>";
  }
  html += sec("Risks", "Q5", risksHtml);

  // Claims
  if (p.claims && p.claims.length) {
    html += sec("Load-bearing claims", "±", list(p.claims, function (c) {
      return esc(c.text) + ' <span class="chip ' + esc(c.label) + '">' + esc(c.label) + "</span>" + (c.citation ? " " + loc(c.citation) : "");
    }));
  }
